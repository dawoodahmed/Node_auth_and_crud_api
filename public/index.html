<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    input, button { padding: 8px 12px; font-size: 15px; }
    input { width: 100%; margin-bottom: 10px; }
    button { cursor: pointer; width: 100%; margin-bottom: 8px; }
    ul { list-style: none; padding: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    li.done span { text-decoration: line-through; color: #aaa; }
    .delete { color: red; background: none; border: none; font-size: 18px; cursor: pointer; }
    #auth, #app { display: none; }
  </style>
</head>
<body>

  <!-- Auth Section -->
  <div id="auth">
    <h2 id="authTitle">Login</h2>
    <input id="nameInput" placeholder="Your name" style="display:none"/>
    <input id="emailInput" placeholder="Email" type="email"/>
    <input id="passInput" placeholder="Password" type="password"/>
    <button onclick="submitAuth()">Submit</button>
    <button onclick="toggleAuth()" style="background:#eee;color:#333">Switch to Register / Login</button>
    <p id="authError" style="color:red"></p>
  </div>

  <!-- App Section -->
  <div id="app">
    <h1>📋 Task Manager</h1>
    <p>Welcome, <strong id="userName"></strong>! <a href="#" onclick="logout()">Logout</a></p>
    <input type="text" id="taskInput" placeholder="Enter a task..." />
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>
  </div>

  <script>
    let token = localStorage.getItem('token')
    let isRegister = false

    function init() {
      if (token) {
        document.getElementById('app').style.display = 'block'
        document.getElementById('userName').textContent = localStorage.getItem('name')
        loadTasks()
      } else {
        document.getElementById('auth').style.display = 'block'
      }
    }

    function toggleAuth() {
      isRegister = !isRegister
      document.getElementById('authTitle').textContent = isRegister ? 'Register' : 'Login'
      document.getElementById('nameInput').style.display = isRegister ? 'block' : 'none'
    }

    async function submitAuth() {
      const email = document.getElementById('emailInput').value
      const password = document.getElementById('passInput').value
      const name = document.getElementById('nameInput').value
      const url = isRegister ? '/auth/register' : '/auth/login'
      const body = isRegister ? { name, email, password } : { email, password }

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      const data = await res.json()

      if (data.error) {
        document.getElementById('authError').textContent = data.error
      } else if (isRegister) {
        document.getElementById('authError').style.color = 'green'
        document.getElementById('authError').textContent = 'Registered! Now login.'
        toggleAuth()
      } else {
        localStorage.setItem('token', data.token)
        localStorage.setItem('name', data.name)
        token = data.token
        location.reload()
      }
    }

    async function loadTasks() {
      const res = await fetch('/tasks', { headers: { Authorization: `Bearer ${token}` } })
      const tasks = await res.json()
      const list = document.getElementById('taskList')
      list.innerHTML = ''
      tasks.forEach(task => {
        list.innerHTML += `
          <li class="${task.completed ? 'done' : ''}">
            <span onclick="toggleTask('${task._id}', ${task.completed})" style="cursor:pointer">
              ${task.completed ? '✅' : '⬜'} ${task.title}
            </span>
            <div>
              <button onclick="editTask('${task._id}', '${task.title}')" style="border:none;background:none;cursor:pointer">✏️</button>
              <button class="delete" onclick="deleteTask('${task._id}')">🗑</button>
            </div>
          </li>`
      })
    }

    async function addTask() {
      const input = document.getElementById('taskInput')
      if (!input.value) return
      await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title: input.value })
      })
      input.value = ''
      loadTasks()
    }

    async function toggleTask(id, current) {
      await fetch(`/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ completed: !current })
      })
      loadTasks()
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      })
      loadTasks()
    }

    async function editTask(id, currentTitle) {
      const newTitle = prompt('Edit task:', currentTitle)
      if (!newTitle || newTitle === currentTitle) return
      await fetch(`/tasks/${id}/title`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title: newTitle })
      })
      loadTasks()
    }

    function logout() {
      localStorage.clear()
      location.reload()
    }

    init()
  </script>
</body>
</html>
